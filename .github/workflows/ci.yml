name: putty-rs CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

env:
  PROTOC_VERSION: '25.3'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Linux-only native deps needed for *building* some crates
      - if: runner.os == 'Linux'
        name: Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libudev-dev
      # Cross‑platform protoc
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --verbose


  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: sudo apt-get update -y && sudo apt-get install -y pkg-config libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: sudo apt-get update -y &&
             sudo apt-get install -y pkg-config libudev-dev
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # Integration tests  (NO `hw-tests` feature)
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - if: runner.os == 'Linux'
        name: Install Linux build deps
        run: sudo apt-get update -y && sudo apt-get install -y pkg-config libudev-dev keyutils libkeyutils-dev

      - name: Run unit & integration tests
        run: cargo test --all

  hw_tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: HW tests (${{ matrix.os }})
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Tools the hw_* tests need
      - if: runner.os == 'Linux'
        name: Install hw-deps (Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config libudev-dev \
            socat openssh-client openssh-server
          sudo mkdir -p /run/sshd        # sshd expects this path

      - if: runner.os == 'macOS'
        name: Install hw-deps (macOS)
        run: |
          brew install openssh

      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run hardware tests
        run: cargo test -p putty_core --features hw-tests -- --nocapture
