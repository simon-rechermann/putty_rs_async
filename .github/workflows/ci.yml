name: putty-rs CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

env:
  PROTOC_VERSION: '25.3'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4

      # Linux-only native deps needed for *building* some crates
      - if: runner.os == 'Linux'
        name: Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libudev-dev libdbus-1-dev
      # Cross‑platform protoc
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - run: cargo build --verbose


  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -y && sudo apt-get install -y pkg-config libudev-dev libdbus-1-dev
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -y &&
             sudo apt-get install -y pkg-config libudev-dev libdbus-1-dev
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # Integration tests  (NO `hw-tests` feature)
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Tests (${{ matrix.os }})
    steps:
      # ------------- tooling for *all* runners --------------------
      - uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      # ------------- Linux: start a Secret-Service session --------
      - if: runner.os == 'Linux'
        name: Linux deps + SecretService session
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update -y
          sudo apt-get install -y \
              pkg-config libudev-dev libdbus-1-dev \
              gnome-keyring dbus-x11

          # gnome-keyring still prefers /run/user/$UID
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          sudo mkdir -p "$XDG_RUNTIME_DIR"
          sudo chown "$(id -u):$(id -g)" "$XDG_RUNTIME_DIR"

          # ── run the tests ────────────────────────────────────────────────
          # • KEYRING_BACKEND=file        → force the portable backend
          # • KEYRING_FILE_DIR            → keep secrets inside the job’s workspace
          # • RUST_LOG                    → extra diagnostics if something breaks again
          export KEYRING_BACKEND=file
          export KEYRING_FILE_DIR="$PWD/.keyring-test"
          mkdir -p "$KEYRING_FILE_DIR"
          export RUST_LOG=keyring::backend=debug

          cargo test --all

      # ------------- macOS & Windows just test --------------------
      - if: runner.os != 'Linux'
        name: Run unit & integration tests
        run: cargo test --all

  hw_tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: HW tests (${{ matrix.os }})
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Tools the hw_* tests need
      - if: runner.os == 'Linux'
        name: Install hw-deps (Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config libudev-dev libdbus-1-dev \
            socat openssh-client openssh-server
          sudo mkdir -p /run/sshd        # sshd expects this path

      - if: runner.os == 'macOS'
        name: Install hw-deps (macOS)
        run: |
          brew install openssh

      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Run hardware tests
        run: cargo test -p putty_core --features hw-tests -- --nocapture
