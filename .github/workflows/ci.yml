name: putty-rs CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

env:
  PROTOC_VERSION: '25.3'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4

      # Linux-only native deps needed for *building* some crates
      - if: runner.os == 'Linux'
        name: Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pkg-config libudev-dev libdbus-1-dev
      # Cross‑platform protoc
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - run: cargo build --verbose


  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -y && sudo apt-get install -y pkg-config libudev-dev libdbus-1-dev
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -y &&
             sudo apt-get install -y pkg-config libudev-dev libdbus-1-dev
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # Integration tests  (NO `hw-tests` feature)
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Tests (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4

      # -------- toolchain / protoc (identical for every OS) ----------
      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      # -------- Linux: install deps, start key-ring, run tests -------
      - name: Linux deps + key-ring + tests
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update -y
          sudo apt-get install -y \
              pkg-config libudev-dev libdbus-1-dev gnome-keyring dbus-user-session

          # 1. start a *private* D-Bus session for this job
          eval "$(dbus-launch --sh-syntax)"

          # 2. launch gnome-keyring; **capture & eval** its export snippet
          eval "$(gnome-keyring-daemon --start --components=secrets)"

          # (optional) quick probe – remove if noisy
          python - <<'PY'
          import keyring, sys
          keyring.set_password("putty_rs", "ci-probe", "ok")
          assert keyring.get_password("putty_rs", "ci-probe") == "ok"
          keyring.delete_password("putty_rs", "ci-probe")
          PY

          # 3. run the Rust tests
          cargo test --all

      # -------- macOS / Windows: just run tests ----------------------
      - name: Run tests
        if: runner.os != 'Linux'
        run: cargo test --all

  hw_tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: HW tests (${{ matrix.os }})
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Tools the hw_* tests need
      - if: runner.os == 'Linux'
        name: Install hw-deps (Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config libudev-dev libdbus-1-dev \
            socat openssh-client openssh-server
          sudo mkdir -p /run/sshd        # sshd expects this path

      - if: runner.os == 'macOS'
        name: Install hw-deps (macOS)
        run: |
          brew install openssh

      - uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Run hardware tests
        run: cargo test -p putty_core --features hw-tests -- --nocapture
